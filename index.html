<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HPD Infra</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100%;
      height: 100vh;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .logo-container {
      animation: fadeIn 2s ease forwards;
      opacity: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .logo-container img {
      width: min(40vw, 280px);
      height: auto;
      object-fit: contain;
      display: block;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px) scale(0.95);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Mobile */
    @media (max-width: 768px) {
      .logo-container img {
        width: 60vw;
      }
    }

    /* Small Phones */
    @media (max-width: 480px) {
      .logo-container img {
        width: 75vw;
      }
    }
  </style>
</head>

<body>

  <div class="logo-container">
    <img src="logo.JPG" alt="Logo">
  </div>

</body>
</html>
